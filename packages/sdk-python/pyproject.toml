[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "trailmark-sdk"
version = "0.1.0"
description = "TrailMark instrumentation SDK — immutable, compliance-grade audit trails for AI agents"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Proprietary" }
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.7",
]

[project.optional-dependencies]
langchain = ["langchain-core>=0.2"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "langchain-core>=0.2",
]

[tool.setuptools.packages.find]
include = ["trailmark*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
