# TrailMark local development stack.
# Phase 6 will add the api/web services with hot reload; for now this provides
# the data plane: PostgreSQL, Redis, and LocalStack (S3 with Object Lock, SQS).
name: trailmark

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: trailmark
      POSTGRES_PASSWORD: trailmark
      POSTGRES_DB: trailmark
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trailmark -d trailmark"]
      interval: 2s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: s3,sqs,secretsmanager
      PERSISTENCE: "0"
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health"]
      interval: 3s
      timeout: 5s
      retries: 40

volumes:
  pgdata:
